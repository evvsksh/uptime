owner: evvsksh
repo: uptime

workflowSchedule:
  uptime: "0 0 * * *" # github action is slow
  responseTime: "15 */6 * * *"
  graphs: "20 2 * * *"
  staticSite: "40 2 * * *"

  summary: "0 3 * * *"
  updates: "30 3 * * *"
  updateTemplate: "0 4 * * *"
  
sites:
  - name: Mirror
    url: https://mirror.evvsk.it
    type: globalping
    location: france
    assignees:
      - evvsksh
    headers:
      - "User-Agent: $UA"
    expectedStatusCodes:
      - 400
      - 200
      - 204
      - 301
      - 302
      - 403
      - 401
  - name: Homepage
    url: https://evvsk.it
    type: globalping
    location: france
    assignees:
      - evvsksh
    headers:
      - "User-Agent: $UA"
    expectedStatusCodes:
      - 400
      - 200
      - 204
      - 301
      - 302
      - 403
      - 401
  - name: Archive
    url: https://archive.evvsk.it
    type: globalping
    location: france
    assignees:
      - evvsksh
    headers:
      - "User-Agent: $UA"
    expectedStatusCodes:
      - 400
      - 200
      - 204
      - 301
      - 302
      - 403
      - 401
  - name: TCC
    url: https://tcc.evvsk.it/api/health
    type: globalping
    location: france
    assignees:
      - evvsksh
    headers:
      - "User-Agent: $UA"
    expectedStatusCodes:
      - 400
      - 200
      - 204
      - 301
      - 302
      - 403
      - 401
  - name: Proxy
    url: https://proxy.evvsk.it
    type: globalping
    location: france
    assignees:
      - evvsksh
    expectedStatusCodes:
      - 400
      - 200
      - 204
      - 301
      - 302
      - 403
      - 401
    headers:
      - "User-Agent: $UA"
  - name: MC Proxy
    check: "tcp-ping"
    url: $MC_PROXY_IP
    port: 48123
    assignees:
      - evvsksh
    expectedStatusCodes:
      - 400
      - 200
      - 204
      - 301
      - 302
      - 403
      - 401
    
status-website:
  cname: status.evvsk.it
  logoUrl: https://avatars.githubusercontent.com/evvsksh
  name: Uptime
  introTitle: ""
  introMessage: ""
  themeUrl: https://status.evvsk.it/theme.css
